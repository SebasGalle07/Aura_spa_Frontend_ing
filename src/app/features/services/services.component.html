<section class="section">
  <div class="container">
    <div class="header">
      <div>
        <h1>Nuestros servicios</h1>
        <p>Selecciona el tratamiento que mejor se adapte a ti.</p>
      </div>
      <div class="filter">
        <label for="category">Categoria</label>
        <select id="category" [(ngModel)]="category" (change)="applyFilter()">
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>
    </div>

    <div class="cards" *ngIf="!loading; else loadingBlock">
      <button type="button" class="card service-card service-card--button" *ngFor="let service of filtered" (click)="openDetails(service)">
        <div class="service-card__image" [style.backgroundImage]="service.image ? 'url(' + service.image + ')' : ''"></div>
        <div class="service-card__body">
          <h3>{{ service.name }}</h3>
          <p>{{ service.category }}</p>
          <div class="service-card__meta">
            <span>{{ service.duration }} min</span>
            <strong>{{ formatPrice(service.price) }}</strong>
          </div>
          <span class="service-card__action">Ver descripcion</span>
        </div>
      </button>
    </div>

    <ng-template #loadingBlock>
      <div class="loading">Cargando servicios...</div>
    </ng-template>
  </div>
</section>

<div class="modal-backdrop" *ngIf="detailService as service" (click)="closeDetails()">
  <article class="card modal" (click)="$event.stopPropagation()">
    <h2>{{ service.name }}</h2>
    <p class="modal__category">{{ service.category }} · {{ service.duration }} min</p>
    <p class="modal__description">{{ describe(service) }}</p>
    <p class="modal__price">{{ formatPrice(service.price) }}</p>

    <div class="modal__actions">
      <button type="button" class="btn btn--secondary" (click)="closeDetails()">Cerrar</button>
      <button type="button" class="btn btn--primary" (click)="reserve(service)">Reservar este servicio</button>
    </div>
  </article>
</div>
