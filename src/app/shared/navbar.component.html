<header class="nav">
  <div class="nav__brand">
    <a routerLink="/" class="brand-link">
      <ng-container *ngIf="branding$ | async as branding">
        <img *ngIf="branding.spLogo" [src]="branding.spLogo" alt="Aura Spa" class="brand-logo" />
      </ng-container>
      <span class="brand-text">Aura Spa</span>
    </a>
  </div>

  <button class="nav__toggle" type="button" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>

  <nav class="nav__links" [class.is-open]="menuOpen">
    <ng-container *ngIf="user$ | async as user; else guest">
      <a *ngIf="user.role === 'client'" routerLink="/book" routerLinkActive="active" (click)="closeMenu()">Reservar</a>
      <a *ngIf="user.role === 'client'" routerLink="/appointments" routerLinkActive="active" (click)="closeMenu()">Mis citas</a>
      <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">Perfil</a>
      <a *ngIf="user.role === 'admin'" routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Admin</a>
      <button class="btn btn--ghost" (click)="logout()">Cerrar sesión</button>
    </ng-container>
    <ng-template #guest>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Inicio</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">Acerca de</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contacto</a>
      <a routerLink="/login" class="btn btn--ghost" (click)="closeMenu()">Iniciar sesión</a>
      <a routerLink="/register" class="btn btn--primary" (click)="closeMenu()">Registrarse</a>
    </ng-template>
  </nav>
</header>

<div class="nav__backdrop" *ngIf="menuOpen" (click)="closeMenu()"></div>
